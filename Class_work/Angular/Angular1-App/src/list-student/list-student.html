<div class="container card my-3">
  <h3 class="my-2">Student Info:</h3>
    <table class="table">
  <thead>
    <tr>
      <th scope="col">Name</th>
      <th scope="col">Age</th>
      <th scope="col">Course</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor = "let studData of studentList">
        <td>{{studData.name}}</td>
        <td>{{studData.age}}</td>
        <td>{{studData.course}}</td>
    </tr>
  </tbody>
</table>
<ul>
  <li *ngFor = "let car of cars">
    {{car}}
  </li>
</ul>
</div>
